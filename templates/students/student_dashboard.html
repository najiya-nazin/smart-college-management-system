{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fc;
}

.sidebar{

    position:fixed;
    left:0;
    top:0;
    width:270px;
    height:100vh;
    background:#0d6efd;
    color:#fff;
    overflow-y:auto;
    box-shadow:4px 0 15px rgba(0,0,0,.15);

}

.logo{

    padding:25px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.15);

}

.logo h3{
    margin:0;
    font-weight:700;
}

.profile{

    text-align:center;
    padding:25px 20px;
}

.profile img{

    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid #fff;
    object-fit:cover;

}

.profile h5{
    margin-top:15px;
    margin-bottom:5px;
}

.profile small{
    color:#dcdcdc;
}

.menu{

    padding:10px;
}

.menu a{

    display:flex;
    align-items:center;
    text-decoration:none;
    color:#fff;
    padding:14px 18px;
    border-radius:10px;
    margin-bottom:8px;
    transition:.3s;

}

.menu a:hover{

    background:rgba(255,255,255,.18);
    transform:translateX(5px);

}

.menu a.active{

    background:#ffffff;
    color:#0d6efd;
    font-weight:600;

}

.menu i{

    font-size:20px;
    margin-right:15px;

}

.content{

    margin-left:270px;
    padding:35px;

}

.topbar{

    background:#fff;
    border-radius:12px;
    padding:18px 25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);

}


.stat-card{
    border-radius:15px;
    transition:.3s;
}

.stat-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 30px rgba(0,0,0,.12)!important;
}

.icon-box{
    width:65px;
    height:65px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:28px;
}

.card-body h6{
    font-size:15px;
    font-weight:600;
}

.card-body h2{
    margin:0;
    font-size:32px;
}

</style>

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <h3>
            <i class="bi bi-mortarboard-fill"></i>
            Smart College
        </h3>

    </div>

    <div class="profile">

        <img src="" alt="Student">

        <h5>{{ request.user.name }}</h5>

        <small>Student</small>

    </div>

    <div class="menu">

        <a href="" class="active">
            <i class="bi bi-house-door-fill"></i>
            Dashboard
        </a>

        <a href="">
            <i class="bi bi-person-circle"></i>
            My Profile
        </a>

        <a href="">
            <i class="bi bi-calendar-week-fill"></i>
            Timetable
        </a>

        <a href="">
            <i class="bi bi-bar-chart-fill"></i>
            Attendance
        </a>

        <a href="">
            <i class="bi bi-journal-text"></i>
            Marks
        </a>

        <a href="">
            <i class="bi bi-file-earmark-text-fill"></i>
            Exams
        </a>

        <a href="">
            <i class="bi bi-cash-stack"></i>
            Fees
        </a>

        <a href="">
            <i class="bi bi-book-half"></i>
            Library
        </a>

        <a href="">
            <i class="bi bi-calendar-event-fill"></i>
            Events
        </a>

        <a href="">
            <i class="bi bi-briefcase-fill"></i>
            Placements
        </a>

        <a href="">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

</div>

<div class="content">

    <div class="topbar">

        <h3 class="mb-0">
            Welcome,
            <strong>{{ request.user.name }}</strong>
        </h3>

    </div>

    <!-- Dashboard Content -->


    <!-- Dashboard Statistics -->

<div class="row mt-4 g-4">

    <div class="col-lg-4 col-md-6">

        <div class="card stat-card border-0 shadow-sm">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h6 class="text-muted mb-2">Total Subjects</h6>
                    <h2 class="fw-bold"></h2>
                </div>

                <div class="icon-box bg-primary">
                    <i class="bi bi-book-fill"></i>
                </div>

            </div>

        </div>

    </div>

    <div class="col-lg-4 col-md-6">

        <div class="card stat-card border-0 shadow-sm">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h6 class="text-muted mb-2">Total Exams</h6>
                    <h2 class="fw-bold"></h2>
                </div>

                <div class="icon-box bg-success">
                    <i class="bi bi-file-earmark-text-fill"></i>
                </div>

            </div>

        </div>

    </div>

    <div class="col-lg-4 col-md-6">

        <div class="card stat-card border-0 shadow-sm">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h6 class="text-muted mb-2">Today's Classes</h6>
                    <h2 class="fw-bold"></h2>
                </div>

                <div class="icon-box bg-warning">
                    <i class="bi bi-calendar-week-fill"></i>
                </div>

            </div>

        </div>

    </div>

    <div class="col-lg-4 col-md-6">

        <div class="card stat-card border-0 shadow-sm">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h6 class="text-muted mb-2">Attendance</h6>
                    <h2 class="fw-bold">%</h2>
                </div>

                <div class="icon-box bg-info">
                    <i class="bi bi-bar-chart-fill"></i>
                </div>

            </div>

        </div>

    </div>

    <div class="col-lg-4 col-md-6">

        <div class="card stat-card border-0 shadow-sm">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h6 class="text-muted mb-2">Pending Fees</h6>
                    <h2 class="fw-bold"></h2>
                </div>

                <div class="icon-box bg-danger">
                    <i class="bi bi-cash-stack"></i>
                </div>

            </div>

        </div>

    </div>

    <div class="col-lg-4 col-md-6">

        <div class="card stat-card border-0 shadow-sm">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h6 class="text-muted mb-2">Library Books</h6>
                    <h2 class="fw-bold"></h2>
                </div>

                <div class="icon-box bg-secondary">
                    <i class="bi bi-book-half"></i>
                </div>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
