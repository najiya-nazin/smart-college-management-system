{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f4f7fc;
            font-family: 'Segoe UI', sans-serif;
        }

        .card{
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .card-header{
            background:linear-gradient(135deg,#0d6efd,#3f7bff);
            color:#fff;
            padding:20px;
        }

        .card-header h3{
            margin:0;
            font-weight:700;
        }

        .card-body{
            padding:35px;
        }

        .form-label{
            font-weight:600;
            color:#495057;
        }

        .form-control,
        .form-select{
            height:48px;
            border-radius:10px;
            border:1px solid #ced4da;
        }

        textarea.form-control{
            height:120px;
        }

        .form-control:focus,
        .form-select:focus{
            border-color:#0d6efd;
            box-shadow:0 0 0 .2rem rgba(13,110,253,.15);
        }

        .btn-save{
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:10px;
            padding:10px 30px;
            font-weight:600;
        }

        .btn-save:hover{
            background:#0b5ed7;
        }

        .btn-back{
            border-radius:10px;
            padding:10px 30px;
        }

        .section-title{
            font-size:18px;
            font-weight:700;
            color:#0d6efd;
            margin-bottom:25px;
            border-left:5px solid #0d6efd;
            padding-left:10px;
        }
    </style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card">

<div class="card-header">
<h3><i class="bi bi-person-plus-fill"></i> Add New Student</h3>
</div>

<div class="card-body">

<div class="section-title">
Student Information
</div>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">User</label>

<select name="user" class="form-select" required>

<option value="">Select User</option>

{% for user in users %}
<option value="{{ user.id }}">{{ user.name }}</option>
{% endfor %}

</select>

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Student ID</label>

<input
type="text"
name="student_id"
class="form-control"
placeholder="Enter Student ID"
required>

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Date of Birth</label>

<input
type="date"
name="dob"
class="form-control">

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Gender</label>

<select name="gender" class="form-select">

<option value="">Select Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>

</select>

</div>


<div class="col-12 mb-3">
<label class="form-label">Address</label>

<textarea
name="address"
class="form-control"
placeholder="Enter Address"></textarea>

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Department</label>

<select name="department" class="form-select">

<option value="">Select Department</option>


<option value="{{ department.id }}">
{{ department.name }}
</option>


</select>

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Course</label>

<select name="course" class="form-select">

<option value="">Select Course</option>


<option value="{{ course.id }}">
{{ course.name }}
</option>


</select>

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Semester</label>

<input
type="number"
name="semester"
class="form-control"
placeholder="Enter Semester">

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Admission Date</label>

<input
type="date"
name="admission_date"
class="form-control">

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Guardian Name</label>

<input
type="text"
name="guardian_name"
class="form-control"
placeholder="Guardian Name">

</div>


<div class="col-md-6 mb-3">
<label class="form-label">Guardian Phone</label>

<input
type="text"
name="guardian_phone"
class="form-control"
placeholder="Guardian Phone">

</div>

</div>

<hr>

<div class="text-end">

<a href="{% url 'admin_dashboard' %}" class="btn btn-secondary btn-back">
<i class="bi bi-arrow-left-circle"></i>
Back
</a>

<button type="submit" class="btn btn-save">
<i class="bi bi-check-circle-fill"></i>
Save Student
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
