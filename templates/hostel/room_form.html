<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

{% if form.instance.pk %}

Update Room

{% else %}

Add Room

{% endif %}

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f7fb;
}

.container{
max-width:900px;
margin:50px auto;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card-header{
background:#0d6efd;
color:white;
padding:20px 25px;
border-radius:15px 15px 0 0;
}

.card-header h3{
margin:0;
}

.card-body{
padding:30px;
}

form p{
margin-bottom:20px;
}

form label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#495057;
}

form input,
form select{

width:100%;
padding:10px 15px;
border:1px solid #ced4da;
border-radius:8px;
outline:none;
transition:.3s;

}

form input:focus,
form select:focus{

border-color:#0d6efd;
box-shadow:0 0 8px rgba(13,110,253,.2);

}

.errorlist{

list-style:none;
padding:0;
margin:6px 0 12px;

}

.errorlist li{

color:#dc3545;
font-size:14px;
font-weight:600;

}

.button-group{

display:flex;
justify-content:space-between;
margin-top:30px;

}

.btn{

min-width:150px;
border-radius:8px;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

<h3>

{% if form.instance.pk %}

Update Room

{% else %}

Add Room

{% endif %}

</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<div class="button-group">

<button
type="submit"
class="btn btn-primary">

{% if form.instance.pk %}

Update Room

{% else %}

Save Room

{% endif %}

</button>

<a
href="{% url 'room-list' %}"
class="btn btn-secondary">

Back

</a>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
