<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Room Details</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f7fb;
}

.container{
max-width:900px;
margin:50px auto;
}

.card{
border:none;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card-header{
background:#0d6efd;
color:white;
padding:20px;
}

.card-header h3{
margin:0;
font-size:24px;
}

.card-body{
padding:30px;
}

.detail-row{
display:flex;
margin-bottom:18px;
padding-bottom:12px;
border-bottom:1px solid #e9ecef;
}

.detail-title{
width:220px;
font-weight:600;
color:#495057;
}

.detail-value{
flex:1;
color:#212529;
}

.button-group{
display:flex;
justify-content:space-between;
margin-top:35px;
}

.btn{
min-width:140px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

<h3>

Room Details

</h3>

</div>

<div class="card-body">

<div class="detail-row">

<div class="detail-title">

Hostel Name

</div>

<div class="detail-value">

{{ room.hostel.name }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Room Number

</div>

<div class="detail-value">

{{ room.room_no }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Capacity

</div>

<div class="detail-value">

{{ room.capacity }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Current Occupancy

</div>

<div class="detail-value">

{{ room.current_occupancy }}

</div>

</div>

<div class="button-group">

<a
href="{% url 'room-update' room.id %}"
class="btn btn-warning">

Edit

</a>

<a
href="{% url 'room-list' %}"
class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</div>

</body>

</html>
