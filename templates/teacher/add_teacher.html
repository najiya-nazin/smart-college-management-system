{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Teacher</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f4f7fc;
    font-family:'Segoe UI',sans-serif;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
    overflow:hidden;
}

.card-header{
    background:linear-gradient(135deg,#0d6efd,#3f7bff);
    color:#fff;
    padding:20px;
}

.card-header h3{
    margin:0;
    font-weight:700;
}

.card-body{
    padding:35px;
}

.section-title{
    font-size:18px;
    font-weight:700;
    color:#0d6efd;
    border-left:5px solid #0d6efd;
    padding-left:10px;
    margin-bottom:25px;
}

.form-label{
    font-weight:600;
}

.form-control,
.form-select{
    height:48px;
    border-radius:10px;
}

.form-control:focus,
.form-select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 0 .2rem rgba(13,110,253,.15);
}

.btn-save{
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:10px;
    padding:10px 25px;
    font-weight:600;
}

.btn-save:hover{
    background:#0b5ed7;
}

.btn-back{
    border-radius:10px;
    padding:10px 25px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card">

<div class="card-header">

<h3>
<i class="bi bi-person-workspace"></i>
Add Teacher
</h3>

</div>

<div class="card-body">

<div class="section-title">
Teacher Information
</div>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Teacher User</label>

<select name="user" class="form-select" required>
    <option value="">Select Teacher User</option>

    {% for user in users %}
        <option value="{{ user.id }}">
            {{ user.name }} ({{ user.email }})
        </option>
    {% empty %}
        <option disabled>No Teacher Users Found</option>
    {% endfor %}
</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Teacher Name</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter Teacher Name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Department</label>

{{ form.department }}

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Email</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Phone</label>

<input
type="text"
name="phone"
class="form-control"
placeholder="Enter Phone Number"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Qualification</label>

<input
type="text"
name="qualification"
class="form-control"
placeholder="Qualification"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Experience</label>

<input
type="number"
name="experience"
class="form-control"
placeholder="Experience"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Salary</label>

<input
type="number"
name="salary"
class="form-control"
placeholder="Salary"
required>

</div>

</div>

<hr>

<div class="text-end">

<a href="" class="btn btn-secondary btn-back">
<i class="bi bi-arrow-left-circle"></i>
Back
</a>

<button type="submit" class="btn btn-save">
<i class="bi bi-check-circle-fill"></i>
Save Teacher
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
