<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
    color:#1e293b;
}

/* =========================================
   Container
========================================= */

.teacher-container{
    width:100%;
    padding:20px;
}

/* =========================================
   Header
========================================= */

.page-header{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:#fff;
    border-radius:18px;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.page-header h2{
    font-size:30px;
    font-weight:700;
    margin-bottom:5px;
}

.page-header i{
    margin-right:10px;
}


/* =========================================
   Main Card
========================================= */

.form-card{
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 12px 30px rgba(15,23,42,.08);
}

/* =========================================
   Two Cards
========================================= */

.teacher-form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    align-items:stretch;

}

/* =========================================
   Card
========================================= */

.info-card{
    border:1px solid #e5e7eb;
    border-radius:18px;
    padding:25px;
    background:#fff;
     display:flex;
    flex-direction:column;
}

.info-card h3{
    display:flex;
    align-items:center;
    gap:8px;
    color:#2563eb;
    font-size:20px;
    font-weight:700;
    margin-bottom:18px;
    padding-bottom:13px;
    border-bottom:1px solid #eef2f7;
}

/* =========================================
   Grid inside cards
========================================= */

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px 20px;
}

.full-width{
    grid-column:1 / -1;
}

/* =========================================
   Form Group
========================================= */

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-size:15px;
    font-weight:600;
    color:#334155;
    margin-bottom:8px;
}

/* =========================================
   Inputs
========================================= */

.form-control,
.form-select{
    width:100%;
    height:42px;
    border:1px solid #d6dce8;
    border-radius:10px;
    padding:0 14px;
    font-size:15px;
    transition:.3s;
    background:#fff;
}

.form-control:focus,
.form-select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
    outline:none;
}

textarea.form-control{
    height:90px;
    padding:12px 14px;
}

/* =========================================
   Errors
========================================= */

.errorlist{
    list-style:none;
    margin-top:5px;
    padding:0;
}

.errorlist li{
    color:#dc2626;
    font-size:13px;
}

/* =========================================
   Buttons
========================================= */

.form-buttons{
    display:flex;
    justify-content:flex-end;
    gap:15px;
    margin-top:30px;
    padding-top:22px;
    border-top:1px solid #eef2f7;
}

.btn-cancel,
.btn-save{
    min-width:170px;
    height:48px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-size:15px;
    font-weight:600;
    text-decoration:none;
    transition:.3s;
}

.btn-cancel{
    background:#e2e8f0;
    color:#334155;
}

.btn-cancel:hover{
    background:#cbd5e1;
}

.btn-save{
    background:#198754;
    color:#fff;
    border:none;
    border-radius:10px;
    padding:12px 28px;
    font-weight:600;
    transition:.3s;
}

.btn-save:hover{
    background:#157347;
}
.input-icon{
    position:relative;
}


.input-icon i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
    font-size:15px;
    pointer-events:none;
}

.input-icon input,
.input-icon select{
    width:100%;
    height:44px;
    padding-left:45px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
}

.input-icon input:focus,
.input-icon select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

.input-icon input:focus+i{
    color:#2563eb;
}
/* =========================================
   Responsive
========================================= */

@media(max-width:1100px){

.teacher-form-grid{
    grid-template-columns:1fr;
}

}

@media(max-width:768px){

.page-header{
    flex-direction:column;
    align-items:flex-start;
    gap:15px;
}

.page-header h2{
    font-size:28px;
}

.header-badge{
    align-self:flex-start;
}

.info-grid{
    grid-template-columns:1fr;
}

.full-width{
    grid-column:auto;
}

.form-buttons{
    flex-direction:column;
}

.btn-save,
.btn-cancel{
    width:100%;
}

}

</style>

<div class="teacher-container">

    <div class="page-header">

        <div>

            <h2>

                <i class="fa-solid fa-user-pen"></i>

                Edit Teacher

            </h2>


        </div>


    </div>

    <div class="form-card">

        <form method="POST">

            {% csrf_token %}

            <div class="teacher-form-grid">

                <!-- Account -->

                <div class="info-card">

                    <h3>

                        <i class="fa-solid fa-user"></i>

                        Account Information

                    </h3>

                    <div class="info-grid">

                        <div class="form-group">

                            <label>Teacher Name</label>

                            {{ form.name }}

                        </div>

                        <div class="form-group">

                            <label>Email</label>

                            {{ form.email }}

                        </div>

                        <div class="form-group">

                            <label>Phone</label>

                            {{ form.phone }}

                        </div>

                    </div>

                </div>

                <!-- Professional -->

                <div class="info-card">

                    <h3>

                        <i class="fa-solid fa-graduation-cap"></i>

                        Professional Information

                    </h3>

                    <div class="info-grid">

                        <div class="form-group">

                            <label>Department</label>

                            {{ form.department }}

                        </div>

                        <div class="form-group">

                            <label>Qualification</label>

                            {{ form.qualification }}

                        </div>

                        <div class="form-group">

                            <label>Experience</label>

                            {{ form.experience }}

                        </div>

                        <div class="form-group">

                            <label>Salary</label>

                            {{ form.salary }}

                        </div>

                    </div>

                </div>

            </div>

            <div class="form-buttons">

                <a href="?section=teachers" class="btn-cancel">

                    <i class="fa-solid fa-arrow-left"></i>

                    Cancel

                </a>

                <button class="btn-save">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Update Teacher

                </button>

            </div>

        </form>

    </div>

</div>
