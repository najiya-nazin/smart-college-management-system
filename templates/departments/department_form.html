{% load static %}
<style>
/* ===================================
   DEPARTMENT FORM
=================================== */

.department-container{

    max-width:900px;

    margin:auto;

    padding:15px;

}

/* ===================================
   HEADER
=================================== */

.page-header{

    background:linear-gradient(135deg,#2563eb,#3b82f6);

    color:#fff;

    border-radius:12px;

    padding:15px 22px;

    margin-bottom:18px;

}

.page-header h2{

    margin:0;

    font-size:24px;

    font-weight:700;

    display:flex;

    align-items:center;

    gap:10px;

}

/* ===================================
   FORM CARD
=================================== */

.form-card{

    background:#fff;

    border-radius:12px;

    box-shadow:0 6px 18px rgba(0,0,0,.08);

    overflow:hidden;

}

/* ===================================
   GRID
=================================== */

.department-form-grid{

    display:grid;

    grid-template-columns:1fr;

}

/* ===================================
   INFORMATION CARD
=================================== */

.info-card{

    border:1px solid #e5e7eb;

    padding:22px;

}

.info-card h3{

    color:#2563eb;

    font-size:18px;

    font-weight:600;

    margin:0 0 18px;

    padding-bottom:12px;

    border-bottom:1px solid #edf2f7;

    display:flex;

    align-items:center;

    gap:8px;

}

/* ===================================
   FORM GRID
=================================== */

.info-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:18px;

}

.full-width{

    grid-column:1/-1;

}

/* ===================================
   FORM GROUP
=================================== */

.form-group{

    display:flex;

    flex-direction:column;

}

.form-group label{

    margin-bottom:6px;

    font-size:13px;

    font-weight:600;

    color:#475569;

}

/* ===================================
   INPUTS
=================================== */

.form-control,
.form-select{

    width:100%;

    height:40px;

    border:1px solid #dbe3ef;

    border-radius:8px;

    padding:0 12px;

    font-size:14px;

    transition:.3s;

    box-sizing:border-box;

}

textarea.form-control{

    height:90px;

    padding:10px 12px;

    resize:vertical;

}

.form-control:focus,
.form-select:focus{

    outline:none;

    border-color:#2563eb;

    box-shadow:0 0 0 2px rgba(37,99,235,.12);

}

/* ===================================
   ERROR
=================================== */

.errorlist{

    list-style:none;

    margin-top:5px;

    padding:0;

    color:#dc2626;

    font-size:12px;

}

/* ===================================
   BUTTONS
=================================== */

.form-buttons{

    display:flex;

    justify-content:flex-end;

    gap:10px;

    margin-top:18px;

    padding-top:18px;

    border-top:1px solid #edf2f7;

}

.btn-save,
.btn-cancel{

    min-width:120px;

    height:40px;

    border:none;

    border-radius:8px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:8px;

    text-decoration:none;

    font-size:14px;

    font-weight:600;

    transition:.3s;

}

.btn-save{

    background:#2563eb;

    color:#fff;

    cursor:pointer;

}

.btn-save:hover{

    background:#1d4ed8;

}

.btn-cancel{

    background:#e2e8f0;

    color:#334155;

}

.btn-cancel:hover{

    background:#cbd5e1;

    color:#1e293b;

}

/* ===================================
   RESPONSIVE
=================================== */

@media(max-width:768px){

    .department-container{

        max-width:100%;

        padding:10px;

    }

    .page-header{

        padding:14px 18px;

    }

    .page-header h2{

        font-size:20px;

    }

    .info-grid{

        grid-template-columns:1fr;

    }

    .full-width{

        grid-column:auto;

    }

    .info-card{

        padding:18px;

    }

    .form-buttons{

        flex-direction:column;

    }

    .btn-save,
    .btn-cancel{

        width:100%;

    }

}
</style>

<div class="department-container">

    <!-- Header -->

    <div class="page-header">

        <div>

            <h2>

                <i class="fa-solid fa-building-columns"></i>

                {% if form.instance.pk %}
                    Edit Department
                {% else %}
                    Add Department
                {% endif %}

            </h2>

        </div>

    </div>

    <!-- Form Card -->

    <div class="form-card">

        <form method="POST" novalidate>

            {% csrf_token %}

            <div class="department-form-grid">

                <!-- Basic Information -->

                <div class="info-card">

                    <h3>

                        <i class="fa-solid fa-circle-info"></i>

                        Department Information

                    </h3>

                    <div class="info-grid">

                        <div class="form-group">

                            <label>Department Name</label>

                            {{ form.name }}

                            {{ form.name.errors }}

                        </div>

                        <div class="form-group">

                            <label>Department Code</label>

                            {{ form.code }}

                            {{ form.code.errors }}

                        </div>

                        <div class="form-group full-width">

                            <label>Description</label>

                            {{ form.description }}

                            {{ form.description.errors }}

                        </div>

                    </div>

                </div>

            </div>

            <!-- Buttons -->

            <div class="form-buttons">

                <a href="?section=departments"
                   class="btn-cancel">

                    <i class="fa-solid fa-arrow-left"></i>

                    Back

                </a>

                <button
                    type="submit"
                    class="btn-save">

                    <i class="fa-solid fa-floppy-disk"></i>

                    {% if form.instance.pk %}
                        Update Department
                    {% else %}
                        Save Department
                    {% endif %}

                </button>

            </div>

        </form>

    </div>

</div>
