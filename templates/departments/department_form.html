{% load static %}
<style>
      /* ===================================
   Container
=================================== */

.department-container{
    width:100%;
    padding:20px;
}

/* ===================================
   Header
=================================== */

.page-header{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:#fff;
    border-radius:18px;
    padding:18px 28px;
    margin-bottom:22px;
}

.page-header h2{
    margin:0;
    font-size:30px;
    font-weight:700;
}

.page-header i{
    margin-right:10px;
}

/* ===================================
   Form Card
=================================== */

.form-card{
    background:#fff;
    border-radius:18px;
    padding:30px;
    box-shadow:0 8px 25px rgba(0,0,0,.06);
}

/* ===================================
   Grid
=================================== */

.department-form-grid{
    display:grid;
    grid-template-columns:1fr;
}

.info-card{
    border:1px solid #e5e7eb;
    border-radius:16px;
    padding:25px;
}

.info-card h3{
    color:#2563eb;
    font-size:24px;
    font-weight:700;
    margin-bottom:22px;
    padding-bottom:15px;
    border-bottom:1px solid #edf2f7;

    display:flex;
    align-items:center;
    gap:10px;
}

/* ===================================
   Form Grid
=================================== */

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full-width{
    grid-column:1 / -1;
}

/* ===================================
   Inputs
=================================== */

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-weight:600;
    margin-bottom:8px;
    color:#1e293b;
}

.form-control,
.form-select{
    width:100%;
    height:46px;
    border:1px solid #dbe3ef;
    border-radius:10px;
    padding:0 15px;
    font-size:15px;
}

textarea.form-control{
    height:140px;
    padding:12px 15px;
    resize:none;
}

.form-control:focus,
.form-select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
    outline:none;
}

/* ===================================
   Error
=================================== */

.errorlist{
    list-style:none;
    margin-top:6px;
    color:#dc2626;
    font-size:14px;
    padding:0;
}

/* ===================================
   Buttons
=================================== */

.form-buttons{
    display:flex;
    justify-content:flex-end;
    gap:15px;
    margin-top:25px;
    padding-top:20px;
    border-top:1px solid #edf2f7;
}

.btn-cancel,
.btn-save{
    min-width:180px;
    height:46px;
    border-radius:10px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;

    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.btn-cancel{
    background:#e2e8f0;
    color:#334155;
}

.btn-cancel:hover{
    background:#cbd5e1;
    color:#1e293b;
}

.btn-save{
    border:none;
    background:#2563eb;
    color:#fff;
    cursor:pointer;
}

.btn-save:hover{
    background:#1d4ed8;
}

/* ===================================
   Responsive
=================================== */

@media(max-width:768px){

    .info-grid{
        grid-template-columns:1fr;
    }

    .form-buttons{
        flex-direction:column;
    }

    .btn-save,
    .btn-cancel{
        width:100%;
    }

}
    </style>

<div class="department-container">

    <!-- Header -->

    <div class="page-header">

        <div>

            <h2>

                <i class="fa-solid fa-building-columns"></i>

                {% if form.instance.pk %}
                    Edit Department
                {% else %}
                    Add Department
                {% endif %}

            </h2>

        </div>

    </div>

    <!-- Form Card -->

    <div class="form-card">

        <form method="POST" novalidate>

            {% csrf_token %}

            <div class="department-form-grid">

                <!-- Basic Information -->

                <div class="info-card">

                    <h3>

                        <i class="fa-solid fa-circle-info"></i>

                        Department Information

                    </h3>

                    <div class="info-grid">

                        <div class="form-group">

                            <label>Department Name</label>

                            {{ form.name }}

                            {{ form.name.errors }}

                        </div>

                        <div class="form-group">

                            <label>Department Code</label>

                            {{ form.code }}

                            {{ form.code.errors }}

                        </div>

                        <div class="form-group full-width">

                            <label>Description</label>

                            {{ form.description }}

                            {{ form.description.errors }}

                        </div>

                    </div>

                </div>

            </div>

            <!-- Buttons -->

            <div class="form-buttons">

                <a href="?section=departments"
                   class="btn-cancel">

                    <i class="fa-solid fa-arrow-left"></i>

                    Back

                </a>

                <button
                    type="submit"
                    class="btn-save">

                    <i class="fa-solid fa-floppy-disk"></i>

                    {% if form.instance.pk %}
                        Update Department
                    {% else %}
                        Save Department
                    {% endif %}

                </button>

            </div>

        </form>

    </div>

</div>
