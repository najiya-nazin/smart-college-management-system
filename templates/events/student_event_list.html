<style>

.page-title{
    color:#2563eb;
    font-size:34px;
    font-weight:700;
    margin-bottom:30px;
}

.event-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.event-card{
    background:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    overflow:hidden;
    transition:.3s ease;
    border-left:5px solid #2563eb;
}

.event-card:hover{
    transform:translateY(-5px);
    box-shadow:0 14px 30px rgba(37,99,235,.18);
}

.event-header{
    padding:16px 22px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:#fff;
}

.event-left h3{
    margin:0;
    font-size:24px;
    font-weight:700;
}

.event-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:12px;
    padding:6px 14px;
    background:rgba(255,255,255,.18);
    border-radius:25px;
    font-size:14px;
    font-weight:600;
}

.event-body{
    padding:22px;
}

.event-details{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
    margin-bottom:20px;
}

.detail-box{
    background:#f8fbff;
    border-left:4px solid #2563eb;
    border-radius:12px;
    padding:16px;
}

.detail-box span{
    display:flex;
    align-items:center;
    gap:8px;
    color:#64748b;
    font-size:14px;
    font-weight:600;
    margin-bottom:8px;
}

.detail-box span i{
    color:#2563eb;
}

.detail-box strong{
    font-size:17px;
    color:#1e293b;
    font-weight:700;
}

.status-active{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 14px;
    background:#dcfce7;
    color:#16a34a;
    border-radius:20px;
    font-weight:600;
}

.event-description{
    background:#f8fbff;
    border:1px solid #e5e7eb;
    border-radius:12px;
    padding:16px;
    color:#475569;
    line-height:1.7;
    font-size:15px;
}

.event-description i{
    color:#2563eb;
    margin-right:8px;
}

.empty-card{
    background:#fff;
    border-radius:18px;
    padding:60px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.empty-card i{
    font-size:70px;
    color:#94a3b8;
    margin-bottom:20px;
}

.empty-card h3{
    color:#334155;
    margin-bottom:10px;
}

.empty-card p{
    color:#64748b;
}


@media(max-width:992px){

    .event-grid{
        grid-template-columns:1fr;
    }

    .event-details{
        grid-template-columns:1fr;
    }

}
</style>

{% if events %}

<div class="event-grid">

    {% for event in events %}

    <div class="event-card">

        <div class="event-header">

            <div class="event-left">

                <h3>
                    {{ event.title }}
                </h3>

                <span class="event-badge">
                    <i class="fa-solid fa-calendar-days"></i>
                    {{ event.event_date|date:"d M Y" }}
                </span>

            </div>

        </div>

        <div class="event-body">

            <div class="event-details">

                <div class="detail-box">

                    <span>
                        <i class="fa-solid fa-building"></i>
                        Organizer
                    </span>

                    <strong>
                        {{ event.organized_by.name }}
                    </strong>

                </div>

                <div class="detail-box">

                    <span>
                        <i class="fa-solid fa-calendar-check"></i>
                        Status
                    </span>

                    <strong class="status-active">
                        Upcoming
                    </strong>

                </div>

            </div>

            <div class="event-description">

                <i class="fa-solid fa-circle-info"></i>

                {{ event.description }}

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% else %}

<div class="empty-card">

    <i class="fa-solid fa-calendar-xmark"></i>

    <h3>No Events Available</h3>

    <p>There are currently no upcoming events.</p>

</div>

{% endif %}
