<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI",sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        .container{
            max-width:850px;
            margin:50px auto;
        }

        .card{
            border:none;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 8px 20px rgba(0,0,0,.08);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            padding:20px;
        }

        .card-header h3{
            margin:0;
            font-size:24px;
        }

        .card-body{
            padding:30px;
        }

        .detail-row{
            display:flex;
            margin-bottom:20px;
            padding-bottom:12px;
            border-bottom:1px solid #e9ecef;
        }

        .detail-title{
            width:220px;
            font-weight:600;
            color:#495057;
        }

        .detail-value{
            flex:1;
            color:#212529;
        }

        .description{

            background:#f8f9fa;
            border:1px solid #dee2e6;
            border-radius:8px;
            padding:15px;
            min-height:120px;

        }

        .button-group{

            display:flex;
            justify-content:space-between;
            margin-top:35px;

        }

        .btn{

            min-width:140px;
            border-radius:8px;

        }

    </style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

<h3>

Event Details

</h3>

</div>

<div class="card-body">

<div class="detail-row">

<div class="detail-title">

Event Title

</div>

<div class="detail-value">

{{ event.title }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Event Date

</div>

<div class="detail-value">

{{ event.event_date }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Organized By

</div>

<div class="detail-value">

{{ event.organized_by.name }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Description

</div>

<div class="detail-value">

<div class="description">

{{ event.description }}

</div>

</div>

</div>

<div class="button-group">

<a
href="{% url 'event-update' event.id %}"
class="btn btn-warning">

Edit

</a>

<a
href="{% url 'event-list' %}"
class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</div>

</body>

</html>
