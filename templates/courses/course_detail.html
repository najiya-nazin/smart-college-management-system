
<style>
    /*==================================
    COURSE DETAIL
==================================*/

.course-container{
    width:100%;
}

.page-header{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:#fff;
    padding:20px 28px;
    border-radius:18px;
    margin-bottom:22px;
}

.page-header h2{
    margin:0;
    font-size:28px;
    font-weight:700;
}

.profile-card{
    background:#fff;
    border-radius:22px;
    padding:30px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.profile-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding-bottom:20px;
    margin-bottom:25px;
    border-bottom:1px solid #edf2f7;
}

.header-left h2{
    font-size:28px;
    font-weight:700;
    color:#1e293b;
    margin-bottom:12px;
}

.course-meta{
    display:flex;
    gap:12px;
}

.code{
    background:#eef4ff;
    color:#2563eb;
    padding:8px 18px;
    border-radius:30px;
    font-size:15px;
    font-weight:600;
}

.status{
    background:#dcfce7;
    color:#15803d;
    padding:10px 22px;
    border-radius:30px;
    font-weight:600;
}

.profile-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:24px;
    align-items:stretch;
}

.info-card{
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:18px;
    padding:24px;
    display:flex;
    flex-direction:column;
}

.info-card h3{
    color:#2563eb;
    font-size:20px;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:10px;
    padding-bottom:15px;
    border-bottom:1px solid #edf2f7;
}

.description-text{
    flex:1;
    min-height:140px;
    line-height:1.8;
    color:#475569;
}

.info-row{
    display:flex;
    justify-content:space-between;
    padding:16px 0;
    border-bottom:1px solid #edf2f7;
}

.info-row:last-child{
    border-bottom:none;
}

.info-row span{
    color:#64748b;
}

.info-row strong{
    color:#1e293b;
}

.form-buttons{
    display:flex;
    justify-content:flex-end;
    gap:16px;
    margin-top:28px;
    padding-top:25px;
    border-top:1px solid #edf2f7;
}

.btn-cancel,
.btn-save{

    min-width:180px;
    height:48px;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:10px;

    border-radius:12px;

    text-decoration:none;

    font-weight:600;

    transition:.3s;
}

.btn-cancel{
    background:#dbe3ef;
    color:#334155;
}

.btn-save{
    background:#2563eb;
    color:#fff;
}

.btn-cancel:hover{
    background:#cbd5e1;
}

.btn-save:hover{
    background:#1d4ed8;
}

/* Responsive */

@media(max-width:992px){

    .profile-header{
        flex-direction:column;
        gap:20px;
    }

    .profile-grid{
        grid-template-columns:1fr;
    }

}

@media(max-width:768px){

    .header-left h2{
        font-size:30px;
    }

    .form-buttons{
        flex-direction:column;
    }

    .btn-save,
    .btn-cancel{
        width:100%;
    }

}


</style>


<div class="course-container">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h2>
                <i class="fa-solid fa-book-open"></i>
                Course Profile
            </h2>
        </div>

    </div>

    <!-- Main Card -->
    <div class="profile-card">

        <!-- Profile Header -->
        <div class="profile-header">

            <div class="header-left">

                <h2>{{ course.name }}</h2>

                <div class="course-meta">

                    <span class="code">
                        {{ course.code }}
                    </span>

                </div>

            </div>

            <div class="status">
                Active Course
            </div>

        </div>

        <!-- Information Grid -->
        <div class="profile-grid">

            <!-- Description -->

            <div class="info-card">

                <h3>

                    <i class="fa-solid fa-file-lines"></i>

                    Description

                </h3>

                <div class="description-text">

                    {{ course.description }}

                </div>

            </div>

            <!-- Course Information -->

            <div class="info-card">

                <h3>

                    <i class="fa-solid fa-book"></i>

                    Course Information

                </h3>

                <div class="info-row">

                    <span>Department</span>

                    <strong>{{ course.department.name }}</strong>

                </div>

                <div class="info-row">

                    <span>Duration</span>

                    <strong>{{ course.duration }}</strong>

                </div>

                <div class="info-row">

                    <span>Course Code</span>

                    <strong>{{ course.code }}</strong>

                </div>

            </div>

        </div>

        <!-- Buttons -->

        <div class="form-buttons">

            <a href="?section=courses"
               class="btn-cancel">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </a>

            <a href="?section=course_update&id={{ course.id }}"
               class="btn-save">

                <i class="fa-solid fa-pen"></i>

                Edit Course

            </a>

        </div>

    </div>

</div>
