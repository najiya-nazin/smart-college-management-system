<style>
/* ===========================
        Courses Grid
=========================== */

.courses-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:24px;
    margin-top:25px;
}

/* ===========================
        Course Card
=========================== */

.course-card{
    background:#fff;
    border-radius:18px;
    padding:22px;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
    transition:.25s ease;
    border:1px solid #edf2f7;
}

.course-card:hover{
    transform:translateY(-4px);
    box-shadow:0 18px 35px rgba(37,99,235,.12);
}

/* ===========================
        Header
=========================== */

.course-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:18px;
}

.course-top h3{
    margin:0;
    font-size:24px;
    color:#1e293b;
    display:flex;
    align-items:center;
    gap:10px;
}

.course-top h3 i{
    color:#2563eb;
}

.course-code{
    display:inline-block;
    margin-top:8px;
    padding:5px 14px;
    border-radius:20px;
    background:#eff6ff;
    color:#2563eb;
    font-size:13px;
    font-weight:600;
}

/* ===========================
        Status
=========================== */

.badge-course{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 14px;
    border-radius:20px;
    background:#dcfce7;
    color:#16a34a;
    font-size:13px;
    font-weight:600;
}

/* ===========================
      Details
=========================== */

.course-details{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin-bottom:16px;
}

.detail{
    background:#f8fbff;
    border-left:4px solid #2563eb;
    border-radius:12px;
    padding:14px 16px;
}

.detail span{
    display:block;
    font-size:13px;
    color:#64748b;
    margin-bottom:5px;
}

.detail strong{
    font-size:17px;
    color:#1e293b;
}

.duration{
    color:#16a34a;
}

/* ===========================
      Description
=========================== */

.course-description{
    background:#f8fbff;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:14px 16px;
    color:#475569;
    line-height:1.6;
    font-size:15px;
}

.course-description i{
    color:#2563eb;
    margin-right:8px;
}

/* ===========================
      Responsive
=========================== */

@media(max-width:992px){

    .courses-grid{
        grid-template-columns:1fr;
    }

}

@media(max-width:768px){

    .course-top{
        flex-direction:column;
        gap:14px;
    }

    .course-details{
        grid-template-columns:1fr;
    }

}
</style>
<div class="courses-grid">
{% for course in courses %}

<div class="course-card">

    <div class="course-top">

        <div>

            <h3>
                <i class="fa-solid fa-book-open"></i>
                {{ course.name }}
            </h3>

            <span class="course-code">
                {{ course.code }}
            </span>

        </div>

        <span class="badge-course">
            <i class="fa-solid fa-circle-check"></i>
            Active
        </span>

    </div>

    <div class="course-details">

        <div class="detail">
            <span>Department</span>
            <strong>{{ course.department.name }}</strong>
        </div>

        <div class="detail">
            <span>Duration</span>
            <strong class="duration">{{ course.duration }}</strong>
        </div>

    </div>

    <div class="course-description">

        <i class="fa-solid fa-circle-info"></i>

        {{ course.description }}

    </div>

</div>

{% empty %}

<div class="alert alert-info">
    No courses assigned.
</div>

{% endfor %}
</div>
