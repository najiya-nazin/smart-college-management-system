<style>
/* ===================================
   COURSE MANAGEMENT
=================================== */

.page-header{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:#fff;
    border-radius:16px;
    padding:18px 24px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:20px;
}

.page-header h2{
    margin:0;
    font-size:22px;
    font-weight:700;

    display:flex;
    align-items:center;
    gap:10px;
}

/* ===================================
   ADD BUTTON
=================================== */

.btn-add{
    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 18px;

    background:#fff;
    color:#2563eb;

    border-radius:10px;

    text-decoration:none;
    font-size:15px;
    font-weight:600;

    transition:.3s;
}

.btn-add:hover{
    background:#eef4ff;
    color:#2563eb;
}

/* ===================================
   CARD
=================================== */

.table-card{
    background:#fff;
    border-radius:18px;
    padding:22px;
    box-shadow:0 8px 20px rgba(0,0,0,.05);
}

/* ===================================
   TOOLBAR
=================================== */

.toolbar{
    display:flex;
    gap:15px;
    align-items:center;
    margin-bottom:22px;
}

.search-box{
    position:relative;
    flex:1;
}

.search-box i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
    font-size:16px;
}

.search-input{
    width:100%;
    height:46px;

    border:1px solid #dbe3ef;
    border-radius:12px;

    padding-left:48px;
    padding-right:18px;

    font-size:15px;

    transition:.3s;
}

.search-input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.08);
}

/* Department Filter */

.filter-select{

    width:220px;
    height:46px;

    border:1px solid #dbe3ef;
    border-radius:12px;

    padding:0 15px;

    font-size:15px;
    background:#fff;
    cursor:pointer;
}

.filter-select:focus{
    outline:none;
    border-color:#2563eb;
}

/* ===================================
   TABLE
=================================== */

.table-responsive{
    overflow-x:auto;
}

.course-table{
    width:100%;
    border-collapse:collapse;
}

.course-table thead{
    background:#2f61df;
}

.course-table thead th{

    padding:15px;

    color:#fff;

    font-size:16px;
    font-weight:600;

    text-align:left;
}

.course-table tbody td{

    padding:16px 15px;

    border-bottom:1px solid #edf2f7;

    vertical-align:middle;
}

.course-table tbody tr:hover{
    background:#f8fbff;
}

/* ===================================
   COURSE INFO
=================================== */

.course-info{
    display:flex;
    align-items:center;
    gap:14px;
}

.avatar{

    width:46px;
    height:46px;

    border-radius:50%;

    background:#2563eb;
    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:18px;
}

.course-info strong{

    font-size:16px;
    font-weight:600;

    color:#1e293b;
}

/* ===================================
   BADGE
=================================== */

.badge{

    display:inline-block;

    background:#eef4ff;
    color:#2563eb;

    padding:7px 16px;

    border-radius:25px;

    font-size:14px;
    font-weight:600;
}

/* ===================================
   ACTION BUTTONS
=================================== */

.actions{

    display:flex;
    justify-content:center;
    gap:8px;
}

.actions a{

    width:72px;
    height:34px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:8px;

    color:#fff;
    text-decoration:none;

    font-size:13px;
    font-weight:600;

    transition:.3s;
}

.actions a:hover{
    transform:translateY(-2px);
}

.view{
    background:#2563eb;
}

.edit{
    background:#f59e0b;
}

.delete{
    background:#ef4444;
}

/* ===================================
   EMPTY
=================================== */

.empty-state{
    padding:50px 20px;
    text-align:center;
    color:#64748b;
}

.empty-state i{
    font-size:45px;
    color:#94a3b8;
    margin-bottom:12px;
}

.empty-state h3{
    font-size:22px;
    margin-bottom:8px;
    color:#334155;
}

.empty-state p{
    font-size:15px;
}

/* ===================================
   BACK BUTTON
=================================== */

.bottom-actions{
    display:flex;
    justify-content:flex-end;
    margin-top:20px;
}

.btn-back{

    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 22px;

    background:#2563eb;
    color:#fff;

    border-radius:10px;

    text-decoration:none;

    font-size:15px;
    font-weight:600;

    transition:.3s;
}

.btn-back:hover{
    background:#1d4ed8;
    color:#fff;
}

/* ===================================
   RESPONSIVE
=================================== */

@media(max-width:992px){

    .toolbar{
        flex-direction:column;
        align-items:stretch;
    }

    .filter-select{
        width:100%;
    }

    .page-header{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .course-table{
        min-width:900px;
    }
}

@media(max-width:768px){

    .actions{
        flex-direction:column;
    }

    .page-header h2{
        font-size:20px;
    }

    .avatar{
        width:42px;
        height:42px;
        font-size:16px;
    }

    .course-info strong{
        font-size:15px;
    }
}
</style>


<div class="page-header">

    <div>
        <h2>
            <i class="fa-solid fa-book-open"></i>
            Course Management
        </h2>
    </div>

   <a href="?section=course_create" class="btn-add">
    <i class="fa-solid fa-plus"></i>
    Add
</a>

</div>

<div class="table-card">

    <form method="GET" class="toolbar">

    <input type="hidden"
           name="section"
           value="courses">

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            name="search"
            class="search-input"
            value="{{ search }}"
            placeholder="Search Course">

    </div>

        <select
    name="department"
    class="filter-select"
    onchange="this.form.submit()">

    <option value="">All Departments</option>

    {% for department in departments %}
        <option
            value="{{ department.id }}"
            {% if selected_department == department.id|stringformat:"s" %}
                selected
            {% endif %}>
            {{ department.name }}
        </option>
    {% endfor %}

    </select>

</form>

    <div class="table-responsive">

        <table class="course-table">

            <thead>

                <tr>

                    <th>Course</th>
                    <th>Code</th>
                    <th>Department</th>
                    <th>Duration</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            {% for course in courses %}

                <tr>

                    <td>

                        <div class="course-info">

                            <div class="avatar">

                                <i class="fa-solid fa-book"></i>

                            </div>

                            <div>

                                <strong>{{ course.name }}</strong>

                            </div>

                        </div>

                    </td>

                    <td>

                        <span class="badge">

                            {{ course.code }}

                        </span>

                    </td>

                    <td>

                        {{ course.department.name }}

                    </td>

                    <td>

                        {{ course.duration }}

                    </td>

                    <td>


<div class="actions">

    <a href="?section=course_detail&id={{ course.id }}"
       class="view">

        View

    </a>

    <a href="?section=course_update&id={{ course.id }}"
       class="edit">

        Edit

    </a>

    <a href="?section=course_delete&id={{ course.id }}"
       class="delete"
       onclick="return confirm('Delete this course?')">

        Delete

    </a>

</div>

</td>

                </tr>

            {% empty %}

                <tr>

                    <td colspan="5">

                        <div class="empty-state">

                            <i class="fa-solid fa-book-open"></i>

                            <h3>No Courses Found</h3>

                            <p>No courses available.</p>

                        </div>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<script>
const search = document.querySelector(".search-input");

let timer;

search.addEventListener("keyup", function(){

    clearTimeout(timer);

    timer = setTimeout(() => {

        this.form.submit();

    },500);

});
</script>
