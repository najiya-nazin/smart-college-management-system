<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Report Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f7fb;
}

.container{
max-width:900px;
margin:50px auto;
}

.card{
border:none;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card-header{
background:#0d6efd;
color:white;
padding:20px;
}

.card-header h3{
margin:0;
font-size:24px;
}

.card-body{
padding:30px;
}

.detail-row{
display:flex;
margin-bottom:18px;
padding-bottom:12px;
border-bottom:1px solid #e9ecef;
}

.detail-title{
width:220px;
font-weight:600;
color:#495057;
}

.detail-value{
flex:1;
color:#212529;
word-break:break-word;
}

.download-btn{

background:#0dcaf0;
color:white;
text-decoration:none;
padding:8px 18px;
border-radius:6px;
display:inline-block;

}

.download-btn:hover{

background:#0aa2c0;
color:white;

}

.button-group{
display:flex;
justify-content:space-between;
margin-top:35px;
}

.btn{
min-width:140px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

<h3>

Report Details

</h3>

</div>

<div class="card-body">

<div class="detail-row">

<div class="detail-title">

Report Type

</div>

<div class="detail-value">

{{ report.report_type }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Generated By

</div>

<div class="detail-value">

{{ report.generated_by.name }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Generated On

</div>

<div class="detail-value">

{{ report.generated_on|date:"d M Y, h:i A" }}

</div>

</div>

<div class="detail-row">

<div class="detail-title">

Report File

</div>

<div class="detail-value">

{% if report.file %}

<a
href="{{ report.file.url }}"
target="_blank"
class="download-btn">

Download Report

</a>

{% else %}

<span class="text-muted">

No file uploaded.

</span>

{% endif %}

</div>

</div>

<div class="button-group">

<a
href="{% url 'report_update' report.id %}"
class="btn btn-warning">

Edit

</a>

<a
href="{% url 'report_list' %}"
class="btn btn-secondary">

Back

<a
href="{% url 'report_list' %}"
class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</div>

</body>

</html>
