
<style>
/* ==========================================
   COMPANY DETAIL
========================================== */

.company-container{
    max-width:1100px;
    margin:auto;
}

/* ==========================================
   PAGE HEADER
========================================== */

.page-header{

    background:linear-gradient(135deg,#2563eb,#3b82f6);

    color:#fff;

    border-radius:15px;

    padding:18px 25px;

    margin-bottom:20px;
}

.page-header h2{

    margin:0;

    display:flex;

    align-items:center;

    gap:10px;

    font-size:24px;

    font-weight:700;
}

/* ==========================================
   PROFILE CARD
========================================== */

.profile-card{

    background:#fff;

    border-radius:15px;

    padding:30px;

    display:flex;

    align-items:center;

    gap:25px;

    margin-bottom:20px;

    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.profile-icon{

    width:90px;

    height:90px;

    border-radius:50%;

    background:#dbeafe;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:38px;

    color:#2563eb;
}

.profile-info h3{

    margin:0;

    color:#1e293b;

    font-size:26px;

    font-weight:700;
}

.profile-info p{

    margin-top:8px;

    color:#64748b;

    font-size:15px;
}

/* ==========================================
   INFO CARD
========================================== */

.info-card{

    background:#fff;

    border-radius:15px;

    padding:30px;

    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.info-card h3{

    margin:0 0 25px;

    display:flex;

    align-items:center;

    gap:10px;

    color:#1e293b;

    font-size:20px;

    font-weight:700;
}

.info-card h3 i{

    color:#2563eb;
}

/* ==========================================
   INFO GRID
========================================== */

.info-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:25px;
}

.info-item{

    display:flex;

    flex-direction:column;
}

.info-item label{

    font-size:13px;

    color:#64748b;

    margin-bottom:8px;

    font-weight:600;

    text-transform:uppercase;

    letter-spacing:.5px;
}

.info-item span{

    color:#1e293b;

    font-size:16px;

    font-weight:500;

    word-break:break-word;
}

.info-item a{

    color:#2563eb;

    text-decoration:none;

    font-weight:600;
}

.info-item a:hover{

    text-decoration:underline;
}

.full-width{

    grid-column:1/-1;
}

/* ==========================================
   BUTTONS
========================================== */
/* ==========================================
   CARD ACTIONS
========================================== */

.card-actions{

    display:flex;

    justify-content:flex-end;

    gap:15px;

    margin-top:30px;

    padding-top:20px;

    border-top:1px solid #e5e7eb;

}

.btn-cancel,
.btn-save{

    min-width:120px;

    height:45px;

    border:none;

    border-radius:10px;

    display:flex;

    align-items:center;

    justify-content:center;

    text-decoration:none;

    font-size:15px;

    font-weight:600;

    transition:.3s;

}

.btn-cancel{

    background:#f3f4f6;

    color:#374151;

}

.btn-cancel:hover{

    background:#e5e7eb;

}

.btn-save{

    background:#2563eb;

    color:#fff;

}

.btn-save:hover{

    background:#1d4ed8;

    color:#fff;

}
/* ==========================================
   RESPONSIVE
========================================== */

@media(max-width:768px){

    .profile-card{

        flex-direction:column;

        text-align:center;
    }

    .info-grid{

        grid-template-columns:1fr;
    }

    .full-width{

        grid-column:auto;
    }

    .form-buttons{

        flex-direction:column;
    }

    .btn-cancel,
    .btn-save{

        width:100%;

        justify-content:center;
    }

}
</style>
<div class="company-container">

    <!-- Page Header -->

    <div class="page-header">

        <h2>
            <i class="fas fa-building"></i>
            Company Details
        </h2>

    </div>

    <!-- Company Profile Card -->

    <div class="profile-card">

        <div class="profile-icon">

            <i class="fas fa-building"></i>

        </div>

        <div class="profile-info">

            <h3>{{ company.name }}</h3>

            <p>{{ company.location }}</p>

        </div>

    </div>

    <!-- Information Card -->

    <div class="info-card">

        <h3>

            <i class="fas fa-circle-info"></i>

            Company Information

        </h3>

        <div class="info-grid">

            <div class="info-item">

                <label>Company Name</label>

                <span>{{ company.name }}</span>

            </div>

            <div class="info-item">

                <label>Location</label>

                <span>{{ company.location }}</span>

            </div>

            <div class="info-item">

                <label>Email</label>

                <span>{{ company.email }}</span>

            </div>

            <div class="info-item">

                <label>Phone</label>

                <span>{{ company.phone }}</span>

            </div>

            <div class="info-item full-width">

                <label>Website</label>

                <span>

                    {% if company.website %}

                        <a href="{{ company.website }}" target="_blank">

                            {{ company.website }}

                        </a>

                    {% else %}

                        Not Available

                    {% endif %}

                </span>

            </div>

        </div>

        <div class="card-actions">

    <a
        href="?section=companies"
        class="btn-cancel"
    >
        <i class="fas fa-arrow-left"></i>
        Back
    </a>

    <a
        href="?section=company_update&id={{ company.id }}"
        class="btn-save"
    >
        <i class="fas fa-pen"></i>
        Edit Company
    </a>

</div>

    </div>

</div>
